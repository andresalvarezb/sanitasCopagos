<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Direccionamientos</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #d9dee8;
      --text: #172033;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #b91c1c;
      --ok: #047857;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: #0f172a;
      color: white;
      padding: 18px 28px;
    }
    header h1 { margin: 0; font-size: 22px; }
    header p { margin: 5px 0 0; color: #cbd5e1; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    h2 { margin: 0 0 14px; font-size: 18px; }
    label { display: block; font-weight: 700; margin-bottom: 7px; }
    input, button {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: white;
    }
    button {
      cursor: pointer;
      background: var(--primary);
      border: 1px solid var(--primary);
      color: white;
      font-weight: 700;
    }
    button:hover { background: var(--primary-dark); }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
      border-color: #cbd5e1;
    }
    button.secondary:hover { background: #cbd5e1; }
    .space { height: 12px; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #f1f5f9;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .status.ok { background: #ecfdf5; color: var(--ok); }
    .status.error { background: #fef2f2; color: var(--danger); }
    .status.warn { background: #fffbeb; color: var(--warn); }
    .hidden { display: none; }
    .import-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #f8fafc;
    }
    .import-item strong { display: block; margin-bottom: 6px; }
    .import-item span { display: block; color: var(--muted); font-size: 13px; margin-bottom: 3px; }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      background: #e0e7ff;
      color: #3730a3;
      margin-bottom: 8px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Admin - Direccionamientos</h1>
    <p>Carga diaria del snapshot actual e historial de actualizaciones.</p>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <h2>1. Cargar archivo diario</h2>
        <p class="muted">El archivo nuevo reemplaza completamente la foto actual de la base de datos. Usa esta pantalla solo para administración.</p>
        <form id="uploadForm">
          <label for="fileInput">Archivo Excel o CSV</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" required />
          <div class="space"></div>
          <button type="submit">Cargar archivo</button>
        </form>
        <div id="uploadStatus" class="status hidden"></div>
      </section>

      <section class="card">
        <h2>Últimas cargas</h2>
        <button class="secondary" id="refreshImports" type="button">Actualizar historial</button>
        <div id="importsList" class="status">Sin consultar.</div>
      </section>
    </div>
  </main>

  <script>
    function $(id) { return document.getElementById(id); }

    function showStatus(element, message, type = '') {
      element.className = 'status ' + type;
      element.textContent = message;
      element.classList.remove('hidden');
    }

    async function parseResponse(response) {
      const text = await response.text();
      try { return JSON.parse(text); } catch { return { detail: text || response.statusText }; }
    }

    $('uploadForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const file = $('fileInput').files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);
      showStatus($('uploadStatus'), 'Procesando archivo. No cierres esta pestaña...', 'warn');

      try {
        const response = await fetch('/api/imports/upload', { method: 'POST', body: formData });
        const data = await parseResponse(response);
        if (!response.ok) throw new Error(data.detail || 'Error cargando archivo');

        showStatus(
          $('uploadStatus'),
          `Carga ${data.estado}\nBatch: ${data.id}\nFilas archivo: ${data.total_filas}\nInsertadas: ${data.filas_insertadas}\nRechazadas: ${data.filas_rechazadas}`,
          data.filas_rechazadas > 0 ? 'warn' : 'ok'
        );
        $('fileInput').value = '';
        loadImports();
      } catch (err) {
        showStatus($('uploadStatus'), err.message, 'error');
      }
    });

    $('refreshImports').addEventListener('click', loadImports);

    async function loadImports() {
      try {
        const response = await fetch('/api/imports');
        const data = await parseResponse(response);
        if (!response.ok) throw new Error(data.detail || 'Error cargando historial');

        if (!data.length) {
          $('importsList').textContent = 'No hay cargas registradas.';
          return;
        }

        $('importsList').className = 'status';
        $('importsList').innerHTML = data.slice(0, 20).map(item => `
          <div class="import-item">
            <span class="badge">#${item.id} · ${item.estado}</span>
            <strong>${item.filename}</strong>
            <span>Filas archivo: ${item.total_filas}</span>
            <span>Insertadas: ${item.filas_insertadas}</span>
            <span>Rechazadas: ${item.filas_rechazadas}</span>
            <span>Fecha carga: ${new Date(item.created_at).toLocaleString('es-CO')}</span>
            ${item.error ? `<span>Error: ${item.error}</span>` : ''}
          </div>
        `).join('');
      } catch (err) {
        showStatus($('importsList'), err.message, 'error');
      }
    }

    loadImports();
  </script>
</body>
</html>
