<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin - Direccionamientos</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <header>
    <h1>Admin - Direccionamientos</h1>
    <p>Carga diaria del snapshot actual e historial de actualizaciones.</p>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <h2>1. Cargar archivo diario</h2>
        <p class="muted">El archivo nuevo reemplaza completamente la foto actual de la base de datos. Usa esta pantalla solo para administración.</p>
        <form id="uploadForm">
          <label for="fileInput">Archivo Excel o CSV</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" required />
          <div class="space"></div>
          <button type="submit">Cargar archivo</button>
        </form>
        <div id="uploadStatus" class="status hidden"></div>
      </section>

      <section class="card">
        <h2>Últimas cargas</h2>
        <button class="secondary" id="refreshImports" type="button">Actualizar historial</button>
        <div id="importsList" class="status">Sin consultar.</div>
      </section>
    </div>
  </main>

  <script type="module" src="/static/admin.js"></script>
</body>
</html>
